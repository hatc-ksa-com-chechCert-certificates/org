<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification - Search</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 10px;
            background-color: #ffffff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 5px;
            border-bottom: 3px solid #888686;
        }

        .header img {
            width: 100%;
            max-width: 1000px;
            height: auto;
            display: block;
        }

        .content {
            text-align: center;
            width: 100%;
        }

        .instruction-text {
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            padding-top: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #888686;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* সার্চ ফর্ম */
        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            width: 100%;
        }

        .search-container label {
            color: #333333;
            white-space: nowrap;
            font-weight: bold;
        }

        .search-container input[type="text"] {
            width: 180px;
            height: 28px;
            border: 1px solid #7a7a7a;
            padding: 0 8px;
            font-size: 16px; /* iOS অটো-জুম প্রোটেকশন */
            border-radius: 0;
            box-sizing: border-box;
        }

        .search-container input[type="submit"] {
            height: 28px;
            font-size: 12px;
            padding: 0 12px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #7a7a7a;
            border-radius: 2px;
            font-weight: bold;
        }

        @media screen and (max-width: 360px) {
            .search-container input[type="text"] {
                width: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- হেডার লোগো -->
        <div class="header">
            <img src="Header_2.png" alt="Logo">
        </div>

        <div class="content">
            <!-- নির্দেশনাবলী -->
            <div class="instruction-text">
                This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
            </div>
            
            <!-- ফর্ম সাবমিট হলে অ্যাকশন যাবে result.html পেজে -->
            <form class="search-container" action="result.html" method="GET">
                <label for="cno">C.No</label>
                <input type="text" id="cno" name="cno" required autocomplete="off">
                <input type="submit" value="check certificate">
            </form>
        </div>
    </div>

</body>
</html>
